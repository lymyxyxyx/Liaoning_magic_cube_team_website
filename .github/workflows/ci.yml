name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Smoke test (no database)
        run: |
          npm run start &
          server_pid=$!
          npm run test:smoke
          smoke_status=$?
          kill "$server_pid" 2>/dev/null || true
          exit $smoke_status
        env:
          BASE_URL: http://localhost:3000
