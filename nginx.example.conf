limit_req_zone $binary_remote_addr zone=feedback_write:10m rate=1r/m;
limit_req_zone $binary_remote_addr zone=analytics_write:10m rate=120r/m;

server {
    listen 80;
    server_name lncubing.com www.lncubing.com;

    location / {
        return 301 https://www.lncubing.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name lncubing.com;

    ssl_certificate /etc/letsencrypt/live/lncubing.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lncubing.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.lncubing.com$request_uri;
}

server {
    listen 443 ssl;
    server_name www.lncubing.com;

    ssl_certificate /etc/letsencrypt/live/lncubing.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lncubing.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = /api/feedback {
        limit_req zone=feedback_write burst=4 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/analytics {
        limit_req zone=analytics_write burst=30 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
    }
}
